<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Nexus AI</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0f1724;
            margin: 0;
            padding: 16px;
        }
        .chat-container {
            max-width: 800px;
            margin: 0 auto;
            background: #1e2937;
            border-radius: 28px;
            height: 95vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            padding: 16px 20px;
            background: #0f1724;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            color: white;
            margin: 0;
            font-size: 1.3rem;
        }
        .header button {
            background: #334155;
            border: none;
            border-radius: 40px;
            padding: 6px 14px;
            color: white;
            cursor: pointer;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            display: flex;
            gap: 10px;
        }
        .user {
            justify-content: flex-end;
        }
        .bot {
            justify-content: flex-start;
        }
        .bubble {
            max-width: 75%;
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.4;
        }
        .user .bubble {
            background: #2563eb;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .bot .bubble {
            background: #334155;
            color: #e2e8f0;
            border-bottom-left-radius: 4px;
        }
        .input-area {
            padding: 16px;
            background: #0f1724;
            border-top: 1px solid #334155;
            display: flex;
            gap: 12px;
        }
        input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 40px;
            border: none;
            background: #334155;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        input::placeholder {
            color: #94a3b8;
        }
        .send-btn {
            background: #2563eb;
            border: none;
            border-radius: 40px;
            padding: 0 24px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
        }
        .send-btn:disabled {
            background: #475569;
            cursor: not-allowed;
        }
        .status {
            text-align: center;
            font-size: 0.7rem;
            padding: 8px;
            color: #facc15;
            background: #0f1724;
        }
        footer {
            text-align: center;
            font-size: 0.6rem;
            padding: 6px;
            color: #475569;
            background: #0f1724;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="header">
        <h1>🧠 Nexus AI</h1>
        <button id="clearBtn">Clear</button>
    </div>
    <div class="messages" id="messages">
        <div class="message bot">
            <div class="bubble">Hello! I'm Nexus AI. Ask me anything!</div>
        </div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your message..." autofocus>
        <button class="send-btn" id="sendBtn">Send</button>
    </div>
    <div class="status" id="status">Ready</div>
    <footer>🔗 Powered by OpenRouter (DeepSeek)</footer>
</div>

<script>
    // ============================================================
    // 🔐 REPLACE THIS WITH YOUR OPENROUTER API KEY
    const API_KEY = "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":
    // ============================================================

    const messagesDiv = document.getElementById('messages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');
    const statusDiv = document.getElementById('status');

    let conversationHistory = [];
    let isProcessing = false;

    function addMessage(role, text) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role}`;
        messageDiv.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
        messagesDiv.appendChild(messageDiv);
        messageDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    async function sendMessage() {
        if (isProcessing) {
            console.log("Already processing, ignoring click");
            return;
        }
        
        const text = userInput.value.trim();
        if (!text) {
            console.log("Empty message, ignoring");
            return;
        }

        console.log("Sending message:", text);
        
        // Clear input and disable button
        userInput.value = '';
        isProcessing = true;
        sendBtn.disabled = true;
        statusDiv.textContent = 'Thinking...';
        
        // Add user message to chat
        addMessage('user', text);
        conversationHistory.push({ role: "user", content: text });
        
        // Add loading indicator
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'message bot';
        loadingDiv.id = 'loading';
        loadingDiv.innerHTML = '<div class="bubble">⏳ Thinking...</div>';
        messagesDiv.appendChild(loadingDiv);
        loadingDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });

        try {
            console.log("Calling OpenRouter API...");
            
            const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`,
                    'HTTP-Referer': window.location.href,
                    'X-Title': 'Nexus AI'
                },
                body: JSON.stringify({
                    model: 'deepseek/deepseek-r1:free',
                    messages: [
                        { role: "system", content: "You are Nexus AI, a helpful, friendly assistant. Keep responses clear and concise." },
                        ...conversationHistory
                    ],
                    temperature: 0.7,
                    max_tokens: 500
                })
            });

            console.log("Response status:", response.status);
            
            const data = await response.json();
            console.log("Response data:", data);
            
            // Remove loading indicator
            const loading = document.getElementById('loading');
            if (loading) loading.remove();
            
            if (data.error) {
                addMessage('bot', `❌ Error: ${data.error.message || 'Unknown error'}`);
                statusDiv.textContent = 'Error';
            } else if (data.choices && data.choices[0]) {
                const reply = data.choices[0].message.content;
                conversationHistory.push({ role: "assistant", content: reply });
                addMessage('bot', reply);
                statusDiv.textContent = 'Ready';
            } else {
                addMessage('bot', '❌ Unexpected response from API');
                statusDiv.textContent = 'Error';
            }
        } catch (error) {
            console.error("Fetch error:", error);
            const loading = document.getElementById('loading');
            if (loading) loading.remove();
            addMessage('bot', `❌ Connection error: ${error.message}`);
            statusDiv.textContent = 'Connection error';
        }
        
        isProcessing = false;
        sendBtn.disabled = false;
        userInput.focus();
    }

    function clearChat() {
        conversationHistory = [];
        while (messagesDiv.children.length > 1) {
            messagesDiv.removeChild(messagesDiv.lastChild);
        }
        addMessage('bot', 'Chat cleared. Ask me anything!');
        statusDiv.textContent = 'Ready';
    }

    // Event listeners
    sendBtn.addEventListener('click', sendMessage);
    clearBtn.addEventListener('click', clearChat);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            sendMessage();
        }
    });
    
    // Check if API key is set
    if (API_KEY === "YOUR_API_KEY_HERE") {
        addMessage('bot', '⚠️ Please set your OpenRouter API key in the code.');
        statusDiv.textContent = 'API key missing';
        sendBtn.disabled = true;
    } else {
        statusDiv.textContent = 'Ready';
        console.log("API key is set");
    }
</script>
</body>
</html>
