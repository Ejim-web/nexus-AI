<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Nexus AI – Offline Assistant</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #0f1724 0%, #1e2a3a 100%);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }
        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 95vh;
            background: rgba(20, 30, 40, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .header {
            padding: 16px 20px;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            margin: 0;
            font-size: 1.3rem;
            background: linear-gradient(135deg, #a5f3fc, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .header button {
            background: #334155;
            border: none;
            border-radius: 40px;
            padding: 6px 14px;
            color: white;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            display: flex;
            gap: 10px;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user { justify-content: flex-end; }
        .avatar {
            width: 32px;
            height: 32px;
            background: #2d3a44;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .message.user .avatar { background: #2563eb; order: 2; }
        .bubble {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 20px;
            background: #1e2f3c;
            color: #e2e8f0;
            font-size: 0.9rem;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .message.user .bubble {
            background: #2563eb;
            color: white;
            border-bottom-right-radius: 6px;
        }
        .message.bot .bubble {
            background: #1e2937;
            border-bottom-left-radius: 6px;
        }
        .loading-indicator {
            padding: 10px 14px;
            background: #1e2937;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: #94a3b8;
        }
        .dot-floating { display: flex; gap: 4px; }
        .dot-floating span {
            width: 6px;
            height: 6px;
            background: #94a3b8;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot-floating span:nth-child(1) { animation-delay: -0.32s; }
        .dot-floating span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%,80%,100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        .input-area {
            padding: 12px 16px;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .input-wrapper {
            display: flex;
            gap: 8px;
            background: #0f1724;
            border-radius: 40px;
            padding: 4px 4px 4px 16px;
            border: 1px solid #334155;
        }
        .input-wrapper:focus-within { border-color: #3b82f6; }
        input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 0;
            color: #f1f5f9;
            font-size: 0.9rem;
            outline: none;
        }
        input::placeholder { color: #5b6e8c; }
        .send-btn {
            background: #3b82f6;
            border: none;
            border-radius: 40px;
            padding: 0 20px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .send-btn:disabled { background: #475569; cursor: not-allowed; }
        footer {
            font-size: 0.6rem;
            text-align: center;
            padding: 6px;
            color: #5b6e8c;
        }
        .status {
            text-align: center;
            font-size: 0.7rem;
            padding: 4px;
            color: #facc15;
            background: #0f1724;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="header">
        <h1>🧠 Nexus AI</h1>
        <button id="clearBtn">Clear</button>
    </div>
    <div class="messages" id="messages">
        <div class="message bot">
            <div class="avatar">🤖</div>
            <div class="bubble">👋 Hello! I'm Nexus AI. I run locally on your device. First download ~250MB (once). After that, I work offline forever. Ask me anything!</div>
        </div>
    </div>
    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="Type your message..." autofocus>
            <button class="send-btn" id="sendBtn">Send</button>
        </div>
    </div>
    <div class="status" id="status">Initializing...</div>
    <footer>🔒 No API keys · Fully offline after first download</footer>
</div>

<script type="importmap">
    {
        "imports": {
            "@huggingface/transformers": "https://unpkg.com/@huggingface/transformers@3.0.2/dist/transformers.min.js"
        }
    }
</script>

<script type="module">
    import { pipeline, env } from '@huggingface/transformers';
    env.allowLocalModels = true;
    env.useBrowserCache = true;

    const messagesDiv = document.getElementById('messages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');
    const statusDiv = document.getElementById('status');

    let generator = null;
    let isProcessing = false;
    let conversationHistory = [];

    function addMessage(role, text) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role}`;
        const avatar = role === 'user' ? '👤' : '🤖';
        messageDiv.innerHTML = `<div class="avatar">${avatar}</div><div class="bubble">${escapeHtml(text)}</div>`;
        messagesDiv.appendChild(messageDiv);
        messageDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }

    function escapeHtml(s) {
        return s.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    function showLoading() {
        const ld = document.createElement('div');
        ld.className = 'message bot';
        ld.id = 'loadingMsg';
        ld.innerHTML = `<div class="avatar">🤖</div><div class="loading-indicator"><span>thinking</span><div class="dot-floating"><span></span><span></span><span></span></div></div>`;
        messagesDiv.appendChild(ld);
        ld.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }

    function hideLoading() {
        const ld = document.getElementById('loadingMsg');
        if (ld) ld.remove();
    }

    async function loadModel() {
        statusDiv.innerText = 'Downloading 250MB model (first time only, please wait)...';
        try {
            generator = await pipeline('text2text-generation', 'Xenova/LaMini-Flan-T5-248M', {
                progress_callback: (p) => {
                    if (p.status === 'downloading') {
                        const percent = p.progress ? Math.round(p.progress * 100) : 0;
                        statusDiv.innerText = `Downloading model: ${percent}%`;
                    }
                }
            });
            statusDiv.innerText = '✅ Ready! You can chat offline.';
            sendBtn.disabled = false;
            userInput.disabled = false;
            userInput.focus();
        } catch (err) {
            statusDiv.innerText = '❌ Download failed. Refresh page to retry.';
            console.error(err);
        }
    }

    async function generateResponse(userMsg) {
        if (!generator) return "Model not ready yet. Please wait for download.";
        try {
            let context = "";
            for (let i = Math.max(0, conversationHistory.length - 6); i < conversationHistory.length; i++) {
                context += `User: ${conversationHistory[i].user}\nAI: ${conversationHistory[i].ai}\n`;
            }
            const prompt = `${context}User: ${userMsg}\nAI:`;
            const output = await generator(prompt, {
                max_new_tokens: 128,
                temperature: 0.7,
                do_sample: true,
            });
            let reply = output[0]?.generated_text || "Sorry, no response.";
            reply = reply.replace(/^AI:\s*/i, '').trim();
            if (!reply) reply = "I'm not sure how to answer that.";
            return reply;
        } catch (err) {
            console.error(err);
            return "Error generating response. Please try again.";
        }
    }

    async function sendMessage() {
        if (isProcessing || !generator) return;
        const text = userInput.value.trim();
        if (!text) return;

        isProcessing = true;
        sendBtn.disabled = true;
        userInput.disabled = true;

        addMessage('user', text);
        userInput.value = '';
        showLoading();

        const reply = await generateResponse(text);
        hideLoading();
        addMessage('bot', reply);
        conversationHistory.push({ user: text, ai: reply });
        if (conversationHistory.length > 10) conversationHistory.shift();

        isProcessing = false;
        sendBtn.disabled = false;
        userInput.disabled = false;
        userInput.focus();
    }

    function clearChat() {
        conversationHistory = [];
        while (messagesDiv.children.length > 1) messagesDiv.removeChild(messagesDiv.lastChild);
        addMessage('bot', '🧹 Conversation cleared. Ask me anything!');
    }

    sendBtn.onclick = sendMessage;
    clearBtn.onclick = clearChat;
    userInput.onkeypress = (e) => { if (e.key === 'Enter' && !isProcessing && generator) sendMessage(); };

    loadModel();
</script>
</body>
</html>
